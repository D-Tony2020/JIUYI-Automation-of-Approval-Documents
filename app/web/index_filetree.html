<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>材料承认书 · 第3步 挂文件 · 久益</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/bom.css">
  <link rel="stylesheet" href="css/filetree.css">
</head>
<body>
  <header class="topbar">
    <div class="steps" id="stepbar"></div>
    <div class="boundary">本环确认证据文件落点（每材质 K MSDS / L REACH·SVHC / Y RoHS）· 拖认不准的报告归位 · 缺可豁免</div>
    <div class="dwgname" id="dwgname"></div>
  </header>

  <div class="busy" id="busy" style="display:none"></div>

  <main class="workspace ft-ws" id="workspace">
    <div class="ft-left">
      <div class="toolbar" id="toolbar"></div>
      <div class="bomtable" id="bomtable"></div>
    </div>
    <aside class="ft-right">
      <div class="unl-head">待归位文件 · 每个都要有主（归材质列 / 横排槽+零件 / 本单不收录）</div>
      <div class="unlinked-zone" id="unlinked"></div>
    </aside>
  </main>

  <footer class="gatebar" id="gatebar">
    <div class="summary" id="summary"></div>
    <button class="gatebtn" id="gatebtn" disabled>放置已确认，进入第5步 →</button>
  </footer>

  <script type="module" src="js/main_filetree.js"></script>
  <script type="module">import { renderSteps } from "./js/steps.js"; renderSteps("stepbar", 3);</script>
</body>
</html>
