<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>材料承认书 · 第2步 理材质 · 久益</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/bom.css">
</head>
<body>
  <header class="topbar">
    <div class="steps" id="stepbar"></div>
    <div class="boundary">本环搭 BOM 脊柱 · 只归料不碰文件树</div>
    <div class="dwgname" id="dwgname"></div>
  </header>

  <div class="busy" id="busy" style="display:none"></div>

  <div class="uploadbar" id="uploadbar">
    <label class="uploadbtn">① 先传核心料 MSDS（决定 BOM，可多选）
      <input type="file" id="file" accept="application/pdf" multiple hidden>
    </label>
    <p class="tip">这步<b>只需各材料的 MSDS</b>——qwen 读后自动提出材质清单。其余报告<b>下一步「④挂文件」按槽补</b>，不必现在全找齐。</p>
    <div class="prep-list">
      <div class="prep-head">📋 整套承认书最终需要的文件（心里有数即可，逐步补）</div>
      <div class="prep-grid">
        <span class="prep-now">核心料 MSDS<small>本步必传</small></span>
        <span>每材质 RoHS / REACH / SVHC<small>④按槽补</small></span>
        <span>部件承认书 / UL / 信赖性<small>④补充</small></span>
        <span>包装 / 出货 / 图纸<small>图纸第①步已传</small></span>
      </div>
    </div>
  </div>

  <main class="workspace bom-ws" id="workspace" style="display:none">
    <div class="toolbar" id="toolbar"></div>
    <div class="bomtable" id="bomtable"></div>
  </main>

  <footer class="gatebar" id="gatebar">
    <div class="summary" id="summary"></div>
    <button class="gatebtn" id="gatebtn" disabled>BOM脊柱已齐，进入第4步 →</button>
  </footer>

  <script type="module" src="js/main_bom.js"></script>
  <script type="module">import { renderSteps } from "./js/steps.js"; renderSteps("stepbar", 2);</script>
</body>
</html>
